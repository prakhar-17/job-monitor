name: Job Monitor

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (UTC; actual start may lag a few minutes)
  workflow_dispatch: {}       # allow manual runs from the Actions tab

permissions:
  contents: write             # needed to commit jobs.db back

concurrency:
  group: job-monitor          # never let two cycles overlap
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run polling cycle
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py --once

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.db
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "Update jobs.db ($(date -u +'%Y-%m-%d %H:%M') UTC)"
            git pull --rebase origin main
            git push
          fi
