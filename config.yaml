  - remotecom        # Remote.com
  - addepar1         # Addepar
  - mesh             # VERIFY: board named "Mesh" (NYC office) — may be Mesh
                     # (crypto) rather than Mesh Payments; remove if alerts look off
  - extend           # VERIFY: could be Extend warranties (SF) rather than
                     # Extend virtual cards (NYC); remove if alerts look off
  - carta
  - adyen
  - robinhood
  - coinbase
  - ripple
  - perpay
  - toast
  - klaviyo
  - tripactions      # Navan (still on its pre-rebrand token; board name is "Navan")
  - upgrade          # VERIFY: board named "Upgrade", plausible but generic slug;
                     # remove if alerts look off
  - payoneer
  - hubspot          # board "HubSpot Product" — 0 postings when added; main
                     # HubSpot careers are on a custom site
  - twilio
  - cloudflare
  - mongodb
  - block            # Block (Square/Cash App)
  - clearstreet      # Clear Street

