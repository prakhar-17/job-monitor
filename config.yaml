# ============================================================
# Job boards to monitor
# ============================================================
# How to find a company's token:
#
#   Greenhouse: careers URLs look like https://boards.greenhouse.io/<token>
#     or https://job-boards.greenhouse.io/<token>. Verify with:
#       https://boards-api.greenhouse.io/v1/boards/<token>/jobs
#   Lever: careers pages look like https://jobs.lever.co/<company>. Verify:
#       https://api.lever.co/v0/postings/<company>?mode=json
#   Ashby: careers pages look like https://jobs.ashbyhq.com/<name>. Verify:
#       https://api.ashbyhq.com/posting-api/job-board/<name>
#
# Bad/removed tokens are logged as a warning and skipped — never fatal.
# Tokens are not always the obvious name (Addepar is addepar1, Remote.com
# is remotecom, Oscar Health is oscar).

