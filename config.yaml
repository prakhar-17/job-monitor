# Not found on Greenhouse/Lever/Ashby (probed 2026-07-02, multiple token
# variants): Rapyd, WEX, i2c, Airbase, Tipalti, Stampli, Varo, MoneyLion,
# Bluevine, Grasshopper Bank, LendingClub, Avant, Pipe, Farther, Chainalysis,
# Circle, Unit21, Moov, Rippling, Varonis, Blackbird Labs, Flywire, PayPal,
# Klarna, Checkout.com, Nuvei, M Science, Salesforce, GM Financial — these
# use other ATSes (Workday, Comeet, Rippling's own, custom sites, etc.).
# Wrong company on the obvious slug (rejected): Current (a Drupal agency),
# Relay (a San Diego dev shop), Blend (not Blend Labs), Papaya (not Papaya Global).

# ============================================================
# Filtering
# ============================================================
# include_keywords are grouped; the group label is shown in the Telegram
# alert, e.g. "[Finance] FP&A Analyst". Keywords are matched against a
# NORMALIZED title: lowercased, "&" expanded to " and ", punctuation
# stripped. So "fp&a" matches "FP&A", "FP and A", "FP/A", etc.
# Each group's "exclude" only applies to that group's matches — "manager"
# kills "Finance Manager" but Product still catches "Product Manager".
include_keywords:
  Finance:
    keywords:
      - "fp&a"
      - "financial analyst"
      - "finance analyst"
      - "finance associate"
      - "strategic finance"
      - "finance transformation"
      - "financial planning"
      - "corporate finance analyst"
      - "revenue analyst"
      - "treasury analyst"
      - "treasury associate"
      - "credit analyst"
      - "credit associate"
    exclude:
      - "manager"
  Product:
    keywords:
      - "product manager"     # any PM; seniority filtered by global excludes
      - "apm"
      - "product analyst"
      - "product operations"
  "Ops/Data":
    keywords:
      - "strategy analyst"
      - "strategy & operations"
      - "business operations"
      - "biz ops"
      - "operations analyst"
      - "operations associate"
      - "revenue operations"
      - "data analyst"
      - "business analyst"
    exclude:
      - "manager"
  Grad:
    keywords:
      - "graduate"            # also matches Graduate Program, Graduate Analyst...
      - "new grad"
      - "early career"
      - "campus hire"
    exclude:
      - "manager"             # Graduate Program Manager runs the program
      - "recruiter"           # Early Career Recruiter hires for it

# exclude_keywords are matched against the RAW title, lowercased only —
# punctuation and spaces are kept, so "lead " (trailing space) excludes
# "Lead Engineer" but not "Team Lead". These apply to EVERY group.
exclude_keywords:
  - "director"
  - "vp"
  - "vice president"
  - "head of"
  - "principal"
  - "intern"
  - "staff"
  - "lead "
  - "senior"
  - "group product"
  - "engineer"    # also covers "engineering"

# A posting is kept if its location contains ANY of these
# (case-insensitive), or if the location is empty...
